name: YouTube Video Publish

on:
  schedule:
    - cron: '0 16 * * 1'   # Every Monday at 11 AM EST (4 PM UTC)
  workflow_dispatch:
    inputs:
      day:
        description: 'Specific article day to upload (leave blank for next unvideoed)'
        required: false
        type: string
      dry_run:
        description: 'Build video but skip upload'
        required: false
        type: boolean
        default: false

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install edge-tts moviepy Pillow google-api-python-client google-auth google-auth-oauthlib

      - name: Build video and upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PERSONAL_SITE_URL: ${{ secrets.PERSONAL_SITE_URL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.day }}" ]; then
            ARGS="$ARGS --day ${{ inputs.day }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python upload_youtube.py $ARGS

      - name: Commit upload status
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A logs/youtube_status.json logs/youtube_upload.log || true
          git diff --staged --quiet || git commit -m "Update YouTube upload status [skip ci]" || true

      - name: Push changes
        run: git push || true
