name: Submit Press Releases

on:
  schedule:
    - cron: '0 15 */3 * *'   # Every 3 days at 10 AM EST (3 PM UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show what would be submitted without submitting)'
        required: false
        type: boolean
        default: false
      index:
        description: 'Submit a specific PR by index (0-based, leave blank for next unsubmitted)'
        required: false
        type: string

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Generate press releases if not yet generated
        env:
          PERSONAL_SITE_URL: ${{ secrets.PERSONAL_SITE_URL }}
          START_DATE: '2026-02-11'
          FREQUENCY: 'daily'
        run: python publish.py --generate-press-releases

      - name: Submit press releases
        env:
          PRLOG_EMAIL: ${{ secrets.PRLOG_EMAIL }}
          PRLOG_PASSWORD: ${{ secrets.PRLOG_PASSWORD }}
          PERSONAL_SITE_URL: ${{ secrets.PERSONAL_SITE_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            python submit_pr.py --dry-run
          elif [ -n "${{ inputs.index }}" ]; then
            python submit_pr.py --index ${{ inputs.index }}
          else
            python submit_pr.py
          fi

      - name: Commit submission status
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A logs/pr_submission_status.json logs/pr_submit.log press_releases/ || true
          git diff --staged --quiet || git commit -m "Update PR submission status [skip ci]" || true

      - name: Push changes
        run: git push || true
